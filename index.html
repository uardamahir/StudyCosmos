<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Cosmos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #050510;
    font-family: 'Raleway', sans-serif;
    color: #e8e0ff;
    overflow-x: hidden;
  }

  #universe {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 3rem;
  }

  .page-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.3rem, 4vw, 2rem);
    font-weight: 400;
    letter-spacing: 0.18em;
    text-align: center;
    margin-bottom: 0.4rem;
    background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .page-sub {
    text-align: center;
    font-size: 0.82rem;
    letter-spacing: 0.2em;
    color: #7c88b0;
    text-transform: uppercase;
    margin-bottom: 2.8rem;
  }

  .cards-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    margin-bottom: 2rem;
  }

  @media(max-width: 500px) {
    .cards-row { grid-template-columns: 1fr; }
  }

  .countdown-card {
    border-radius: 18px;
    padding: 1.6rem 1.4rem;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
  }

  .countdown-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    padding: 1.5px;
    background: linear-gradient(135deg, var(--g1), var(--g2));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .card-kpss {
    --g1: #c084fc;
    --g2: #818cf8;
    background: rgba(12, 8, 35, 0.72);
  }

  .card-uni {
    --g1: #38bdf8;
    --g2: #34d399;
    background: rgba(4, 18, 35, 0.72);
  }

  .card-label {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #7c88b0;
    margin-bottom: 0.25rem;
  }

  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .kpss-title { color: #c084fc; }
  .uni-title { color: #38bdf8; }

  .days-number {
    font-family: 'Cinzel', serif;
    font-size: clamp(3rem, 10vw, 4.5rem);
    font-weight: 600;
    line-height: 1;
    margin-bottom: 0.2rem;
  }

  .kpss-num {
    background: linear-gradient(135deg, #c084fc, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .uni-num {
    background: linear-gradient(135deg, #38bdf8, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .days-label {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #4a5270;
  }

  .date-badge {
    display: inline-block;
    margin-top: 1rem;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: #5a6284;
    border: 1px solid rgba(255,255,255,0.07);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .progress-bar-wrap {
    margin-top: 1rem;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 1s ease;
  }

  .kpss-fill { background: linear-gradient(90deg, #c084fc, #818cf8); }
  .uni-fill { background: linear-gradient(90deg, #38bdf8, #34d399); }

  .tracker-section {
    border-radius: 18px;
    padding: 1.8rem 1.6rem;
    background: rgba(8, 8, 28, 0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.07);
  }

  .tracker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.4rem;
    flex-wrap: wrap;
    gap: 0.8rem;
  }

  .tracker-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: #c084fc;
    letter-spacing: 0.1em;
  }

  .streak-badge {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: #fbbf24;
    border: 1px solid rgba(251,191,36,0.25);
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(251,191,36,0.07);
  }

  .check-prompt {
    background: rgba(192,132,252,0.08);
    border: 1px solid rgba(192,132,252,0.2);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .check-prompt p {
    font-size: 0.88rem;
    color: #d8d0f0;
    flex: 1;
    min-width: 160px;
  }

  .btn-yes, .btn-no {
    font-family: 'Raleway', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-yes {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
  }

  .btn-no {
    background: rgba(255,255,255,0.06);
    color: #7c88b0;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-yes:hover { opacity: 0.85; transform: scale(0.98); }
  .btn-no:hover { opacity: 0.75; transform: scale(0.98); }

  .today-logged {
    display: none;
    background: rgba(52,211,153,0.07);
    border: 1px solid rgba(52,211,153,0.2);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1.4rem;
    font-size: 0.85rem;
    color: #34d399;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .calendar-grid-label {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #4a5270;
    margin-bottom: 0.8rem;
  }

  .cal-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .cal-day {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    position: relative;
    transition: transform 0.2s;
    cursor: default;
  }

  .cal-day.studied {
    background: linear-gradient(135deg, #7c3aed88, #4f46e588);
    border-color: #818cf844;
    box-shadow: 0 0 6px #7c3aed44;
  }

  .cal-day.missed {
    background: rgba(239,68,68,0.08);
    border-color: rgba(239,68,68,0.15);
  }

  .cal-day.today-mark {
    border: 1.5px solid #c084fc;
  }

  .cal-day:hover { transform: scale(1.25); z-index: 5; }

  .legend {
    display: flex;
    gap: 1.2rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: #4a5270;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .l-studied { background: linear-gradient(135deg, #7c3aed88, #4f46e588); border: 1px solid #818cf844; }
  .l-missed { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.2); }
  .l-empty { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); }
</style>
</head>
<body>

<canvas id="universe"></canvas>

<div class="container">
  <h1 class="page-title">✦ STUDY COSMOS ✦</h1>
  <p class="page-sub">Your universe of progress</p>

  <div class="cards-row">
    <div class="countdown-card card-kpss">
      <div class="card-label">Hedef</div>
      <div class="card-title kpss-title">KPSS 2026</div>
      <div class="days-number kpss-num" id="kpss-days">—</div>
      <div class="days-label">days remaining</div>
      <div class="date-badge">6 Eylül 2026</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill kpss-fill" id="kpss-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="countdown-card card-uni">
      <div class="card-label">Dönem Sonu</div>
      <div class="card-title uni-title">Üniversite</div>
      <div class="days-number uni-num" id="uni-days">—</div>
      <div class="days-label">days remaining</div>
      <div class="date-badge">15 Haziran 2026</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill uni-fill" id="uni-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="tracker-section">
    <div class="tracker-header">
      <div class="tracker-title">📖 Çalışma Takvimi</div>
      <div class="streak-badge" id="streak-badge">🔥 0 day streak</div>
    </div>

    <div class="check-prompt" id="check-prompt">
      <p>Bugün çalıştın mı?<br><span style="font-size:0.78rem;color:#5a6284;">Did you study today?</span></p>
      <div style="display:flex;gap:8px;">
        <button class="btn-yes" onclick="logStudy(true)">✓ Yes</button>
        <button class="btn-no" onclick="logStudy(false)">✗ No</button>
      </div>
    </div>

    <div class="today-logged" id="today-logged"></div>

    <div class="calendar-grid-label" id="cal-label">Loading calendar...</div>
    <div class="cal-grid" id="cal-grid"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot l-studied"></div> Studied</div>
      <div class="legend-item"><div class="legend-dot l-missed"></div> Missed</div>
      <div class="legend-item"><div class="legend-dot l-empty"></div> Upcoming</div>
    </div>
  </div>
</div>

<script>
/* ───────── STORAGE ───────── */
const STORAGE_KEY = 'study_cosmos_v1';
const START_DATE  = new Date('2026-04-03');

function getStudyData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}

function saveStudyData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e){}
}

function todayStr() {
  const n = new Date();
  return n.getFullYear() + '-' +
    String(n.getMonth()+1).padStart(2,'0') + '-' +
    String(n.getDate()).padStart(2,'0');
}

/* ───────── COUNTDOWNS ───────── */
function updateCountdowns() {
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const ms    = 86400000;

  const kpss = new Date('2026-09-06');
  const uni  = new Date('2026-06-15');

  document.getElementById('kpss-days').textContent = Math.max(0, Math.round((kpss - today) / ms));
  document.getElementById('uni-days').textContent  = Math.max(0, Math.round((uni  - today) / ms));

  const kpssStart = new Date('2026-01-01');
  const uniStart  = new Date('2026-02-01');

  const kpssP = Math.min(100, Math.max(0,
    (today - kpssStart) / (kpss - kpssStart) * 100));
  const uniP  = Math.min(100, Math.max(0,
    (today - uniStart)  / (uni  - uniStart)  * 100));

  document.getElementById('kpss-bar').style.width = kpssP.toFixed(1) + '%';
  document.getElementById('uni-bar').style.width  = uniP.toFixed(1)  + '%';
}

/* ───────── STREAK ───────── */
function calcStreak(data) {
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const s = d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
    if (data[s] === true) streak++;
    else if (i > 0) break;
  }
  return streak;
}

/* ───────── CALENDAR ───────── */
function renderCalendar() {
  const data  = getStudyData();
  const grid  = document.getElementById('cal-grid');
  const label = document.getElementById('cal-label');
  const today = todayStr();
  grid.innerHTML = '';

  const startMonth = START_DATE.toLocaleString('tr-TR', { month: 'long', year: 'numeric' });
  label.textContent = startMonth + ' — onwards';

  for (let i = 0; i < 90; i++) {
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + i);
    const s = d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');

    const el = document.createElement('div');
    el.className = 'cal-day';
    el.title = s;

    if (s === today)          el.classList.add('today-mark');
    if (data[s] === true)     el.classList.add('studied');
    else if (data[s] === false && s < today) el.classList.add('missed');

    grid.appendChild(el);
  }

  document.getElementById('streak-badge').textContent =
    '🔥 ' + calcStreak(data) + ' day streak';
}

/* ───────── DAILY CHECK ───────── */
function checkTodayStatus() {
  const data = getStudyData();
  const t    = todayStr();

  if (t in data) {
    document.getElementById('check-prompt').style.display = 'none';
    const msg = document.getElementById('today-logged');
    msg.style.display = 'block';
    msg.textContent = data[t]
      ? '✓ Bugün çalıştın! Keep going! 🌟'
      : '❌ Bugün çalışmadın. Tomorrow is a new day.';
  } else {
    document.getElementById('check-prompt').style.display = 'flex';
    document.getElementById('today-logged').style.display = 'none';
  }
}

window.logStudy = function(studied) {
  const data = getStudyData();
  data[todayStr()] = studied;
  saveStudyData(data);
  renderCalendar();
  checkTodayStatus();
};

/* ───────── INIT ───────── */
updateCountdowns();
renderCalendar();
checkTodayStatus();
setInterval(updateCountdowns, 60000);

/* Midnight reset check — re-checks every minute */
setInterval(checkTodayStatus, 60000);
</script>

<!-- ───────── UNIVERSE CANVAS ───────── -->
<script>
(function () {
  const canvas = document.getElementById('universe');
  const ctx    = canvas.getContext('2d');
  let W, H, stars = [], nebulae = [], raf;

  const STAR_COUNT   = 300;
  const STAR_COLORS  = ['#ffffff','#e0d4ff','#bae6fd','#a5f3fc','#ddd6fe','#fde68a'];
  const NEBULA_DEFS  = [
    ['#6d28d9','#a21caf','#1e1b4b'],
    ['#0e7490','#065f46','#0c4a6e'],
    ['#7c3aed','#1d4ed8','#0f172a'],
    ['#db2777','#7c3aed','#1e1b4b'],
    ['#0369a1','#0d9488','#134e4a'],
    ['#4f46e5','#7e22ce','#0f172a'],
  ];

  function hexRgba(hex, a) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function init() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;

    stars = Array.from({ length: STAR_COUNT }, () => ({
      x:     Math.random() * W,
      y:     Math.random() * H,
      r:     Math.random() * 1.5 + 0.2,
      speed: Math.random() * 0.005 + 0.001,
      phase: Math.random() * Math.PI * 2,
      color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)],
    }));

    nebulae = NEBULA_DEFS.map(cols => ({
      x:      Math.random() * W,
      y:      Math.random() * H,
      rx:     W * (0.18 + Math.random() * 0.24),
      ry:     H * (0.12 + Math.random() * 0.20),
      colors: cols,
      alpha:  0.05 + Math.random() * 0.07,
    }));
  }

  function drawNebulae() {
    nebulae.forEach(n => {
      ctx.save();
      ctx.scale(1, n.ry / n.rx);
      const yScaled = n.y * (n.rx / n.ry);
      const grad = ctx.createRadialGradient(n.x, yScaled, 0, n.x, yScaled, n.rx);
      grad.addColorStop(0,   hexRgba(n.colors[0], n.alpha));
      grad.addColorStop(0.5, hexRgba(n.colors[1], n.alpha * 0.5));
      grad.addColorStop(1,   hexRgba(n.colors[2], 0));
      ctx.beginPath();
      ctx.arc(n.x, yScaled, n.rx, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    });
  }

  function drawStars(t) {
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = hexRgba(s.color, alpha);
      ctx.fill();
    });
  }

  let t0 = null;
  function loop(ts) {
    if (!t0) t0 = ts;
    const t = (ts - t0) / 1000;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W, H);
    drawNebulae();
    drawStars(t);
    raf = requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => {
    cancelAnimationFrame(raf);
    init();
    raf = requestAnimationFrame(loop);
  });

  init();
  raf = requestAnimationFrame(loop);
})();
</script>

</body>
</html>
